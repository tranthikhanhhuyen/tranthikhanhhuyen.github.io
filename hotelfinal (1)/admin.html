    <style>
        :root {
            --navy: #0f172a;
            --gold: #c5a059;
            --gold-hover: #b08d45;
            --light-gray: #f8fafc;
            --accent-gold: rgba(197, 160, 89, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--light-gray);
            color: #1e293b;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        .sidebar-item.active {
            background-color: var(--gold);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(197, 160, 89, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #c5a059 0%, #ecd4a1 100%);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="overflow-hidden">

        // --- NAVIGATION LOGIC ---
        function switchTab(tab) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');

            const container = document.getElementById('main-view');
            container.innerHTML = ""; 

            switch(tab) {
                case 'dashboard': renderDashboard(); break;
                case 'rooms': renderRooms(); break;
                case 'dining': renderDining(); break;
                case 'bookings': renderBookings(); break;
                case 'guests': renderGuests(); break;
                case 'reviews': renderReviews(); break;
                case 'finance': renderFinance(); break;
                case 'staff': renderStaff(); break;
                case 'cms': renderCMS(); break;
                case 'settings': renderSettings(); break;
            }
        }

                                </div>
                                <span class="text-[10px] font-bold px-2 py-1 rounded-full ${s.trend === 'up' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">

        function renderRooms() {
            let html = `

        // --- CHART INIT ---
        function initChart() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Daily Revenue ($)',
                        data: [32000, 35000, 28000, 41000, 52000, 68000, 62000],
                        borderColor: '#c5a059',
                        backgroundColor: 'rgba(197, 160, 89, 0.08)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#c5a059',
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: '#f1f5f9', borderDash: [5, 5] }, 
                            ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { font: { size: 10, weight: 'bold' }, color: '#94a3b8' } 
                        }
                    }
                }
            });
        }
